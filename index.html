<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beach Volleyball Tournaments — Czech Republic</title>
</head>
<body>

  <header>
    <!-- Hero section with name of the tournament -->
    <h1>Tournament Name Goes Here</h1>
    <p>Short tagline about the tournament</p>
  </header>

  <main>
    <section>
      <!-- List of the tournaments -->
      <h2>Upcoming Tournaments</h2>
      <ul>
        <li>Tournament 1 — City, Date</li>
        <li>Tournament 2 — City, Date</li>
        <li>Tournament 3 — City, Date</li>
      </ul>
    </section>

    <section>
      <!-- Button to register -->
      <h2>Register</h2>
      <button>Register Now</button>
    </section>

    <section>
      <!-- Contact form -->
      <h2>Contact Us</h2>
      <form>
        <label for="name">Name</label>
        <input type="text" id="name" name="name">

        <label for="email">Email</label>
        <input type="email" id="email" name="email">

        <label for="message">Message</label>
        <textarea id="message" name="message"></textarea>

        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Beach Volleyball Tournaments</p>
  </footer>

</body>
</html>
